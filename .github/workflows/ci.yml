name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Lint
      - name: Run linter
        run: npm run lint

      # 5. Unit Tests
      - name: Run tests
        run: npm test

      # 6. Build
      - name: Build
        run: npm run build

      # 7. Start server in background
      - name: Start server
        run: nohup npm start > /tmp/server.log 2>&1 &
        timeout-minutes: 1

      # 8. Wait for server to be ready
      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/health 2>/dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 1
          done
          echo "Server did not start"
          cat /tmp/server.log
          exit 1

      # 9. E2E Tests
      - name: Run E2E tests
        run: npm run test:e2e

      # 10. Success message
      - name: ✅ All checks passed!
        if: success()
        run: echo "Pipeline completed successfully"
